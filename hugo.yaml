baseURL: "https://orange-es.github.io/"
title: "Jingbw 的博客"
theme: "PaperMod"
languageCode: "zh-cn"
hasCJKLanguage: true  # 开启中文字数统计

params:
  env: production
  description: "在这里写下你的座右铭或个人介绍"
  author: "Orange-es"
  
  # 首页个人资料模式
  homeInfoParams:
    Title: "你好 👋"
    Content: "欢迎来到我的数字花园，这里记录技术与生活。"

