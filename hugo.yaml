baseURL: "https://orange-es.github.io/"
title: "Orange-es 的博客"
theme: "PaperMod"
languageCode: "zh-cn"
hasCJKLanguage: true

params:
  env: production
  description: "记录技术与生活"
  author: "Orange-es"

  homeInfoParams:
    Title: "你好 👋"
    Content: "欢迎来到我的个人博客。这里是我分享想法和记录成长的地方。"

  socialIcons:
    - name: "github"
      url: "https://github.com/Orange-es"
    - name: "email"
      url: "mailto:your-email@example.com"

  ShowCodeCopyButtons: true
  ShowReadingTime: true
  ShowToc: true
  TocOpen: false

# 导航栏配置
menu:
  main:
    - name: "关于"
      url: "/about"
      weight: 10
    - name: "文章"
      url: "/posts"
      weight: 20
    - name: "归档"
      url: "/archives"
      weight: 30
    - name: "搜索"
      url: "/search"
      weight: 40
